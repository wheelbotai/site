name: Release — Auto Tag

# Bumps the patch version and pushes a new semver tag after CI passes on main.
# The new tag triggers "Deploy — wheelbot.io".
#
# Manual dispatch lets you bump minor or major, or pin an exact tag.

on:
  workflow_run:
    workflows: ["CI — wheelbot.io"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]
      tag_override:
        description: "Pin an exact tag instead of bumping (e.g. v2.0.0) — optional"
        required: false

jobs:
  tag:
    name: Bump and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout (full history for tag inspection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN is sufficient — deploy fires via workflow_run on
          # this run's completion, not a `push: tags` trigger, so no PAT is needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next tag
        id: next
        run: |
          if [ -n "${{ inputs.tag_override }}" ]; then
            echo "tag=${{ inputs.tag_override }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="${{ inputs.bump || 'patch' }}"
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.next.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Tag $TAG is new — proceeding."

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push tag
        run: |
          TAG="${{ steps.next.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✓ Pushed $TAG"

      - name: Job summary
        run: |
          echo "## Tag Released" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.next.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
