name: Deploy — wheelbot.io

# Deploys to Cloudflare Pages production after "Release — Auto Tag" succeeds.
# Chain: push to main → "CI — wheelbot.io" → "Release — Auto Tag" → this deploy.
# We trigger on workflow_run (not on tag push) because tags pushed by Auto-Tag
# with the default GITHUB_TOKEN do NOT fire a `push: tags` workflow (GitHub's
# recursion guard) — that silently left the site stale. workflow_run events are
# not subject to that guard, so this fires reliably with no PAT to manage.
# Manual dispatch lets you force a deploy.
#
# Validation runs separately in "CI — wheelbot.io" on every push to main.
#
# Required secrets:
#   CF_API_TOKEN   — Cloudflare API token (Pages:Edit)
#   CF_ACCOUNT_ID  — Cloudflare account ID

on:
  workflow_run:
    workflows: ["Release — Auto Tag"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Deploy on manual dispatch, or when the upstream Auto-Tag run succeeded.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Validate key files exist
        run: |
          MISSING=0
          for f in index.html; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ $f missing"
              MISSING=$((MISSING+1))
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name wheelbot --branch main

      - name: Verify deployment
        run: |
          echo "Waiting 20s for CDN propagation..."
          sleep 20
          HTTP=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 15 https://wheelbot.io || echo 000)
          if [ "$HTTP" = "200" ]; then
            echo "✓ wheelbot.io is live (HTTP $HTTP)"
          else
            echo "⚠ HTTP $HTTP — CDN may still be propagating"
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Site Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://wheelbot.io" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
