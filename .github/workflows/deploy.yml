name: Deploy wheelbot.io

# push to main → production deploy to Cloudflare Pages (no build step — static HTML)
#
# Required secrets:
#   CF_API_TOKEN   — Cloudflare API token (Pages:Edit)
#   CF_ACCOUNT_ID  — Cloudflare account ID

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate key files exist
        run: |
          MISSING=0
          for f in index.html; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ $f missing"
              MISSING=$((MISSING+1))
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name wheelbot-site --branch main

      - name: Verify deployment
        run: |
          echo "Waiting 20s for CDN propagation..."
          sleep 20
          HTTP=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 15 https://wheelbot.io || echo 000)
          if [ "$HTTP" = "200" ]; then
            echo "✓ wheelbot.io is live (HTTP $HTTP)"
          else
            echo "⚠ HTTP $HTTP — CDN may still be propagating"
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Site Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://wheelbot.io" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
